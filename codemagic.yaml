workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    # Si ton pubspec.yaml est dans App_IOS/terrarium_app/, décommente la ligne suivante :
    # working_directory: terrarium_app
    scripts:
      - name: Get packages
        script: flutter packages pub get
      - name: Build iOS unsigned for sideload
        script: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r -9 app-unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      - build/ios/iphoneos/app-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log